services:

  # MinIO — S3-compatible object storage for Iceberg data files
  minio:
    image: minio/minio
    container_name: minio
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    ports:
      - 9001:9001
      - 9000:9000
    command: ["server", "/data", "--console-address", ":9001"]

  # MinIO Client — initialises the warehouse bucket on startup
  mc:
    depends_on:
      - minio
    image: minio/mc
    container_name: mc
    networks:
      iceberg_net:
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 admin password) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing minio/warehouse;
      /usr/bin/mc policy set public minio/warehouse;
      tail -f /dev/null
      "

  # Iceberg REST Catalog
  rest:
    image: tabulario/iceberg-rest
    container_name: iceberg-rest
    networks:
      iceberg_net:
    ports:
      - 8181:8181
    depends_on:
      - minio
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000

  # Trino — query engine; entrypoint waits for self-readiness then runs init SQL
  trino:
    image: trinodb/trino
    container_name: trino
    networks:
      iceberg_net:
    ports:
      - 8080:8080
    depends_on:
      - minio
      - rest
    volumes:
      - ./trino/semantic_demo.properties:/etc/trino/catalog/semantic_demo.properties
      - ./trino/init-tpch.sql:/docker-entrypoint-initdb.d/init-tpch.sql
      - ./trino/entrypoint.sh:/usr/local/bin/custom-entrypoint.sh
    environment:
      - TRINO_CONF_DIR=/etc/trino
    entrypoint: ["/usr/local/bin/custom-entrypoint.sh"]

  # dbt + MetricFlow — entrypoint waits for Trino + data tables before running dbt
  dbt-metricflow:
    build: ./dbt-metricflow
    container_name: dbt-metricflow
    networks:
      iceberg_net:
    ports:
      - "8087:8087"
    environment:
      - TRINO_HOST=trino
      - TRINO_PORT=8080
      - TRINO_CATALOG=semantic_demo
      - TRINO_SCHEMA=ice_db
    depends_on:
      - trino
    volumes:
      - ./dbt-metricflow:/dbt

  # Ontop — virtual knowledge graph; waits for Trino port via ONTOP_WAIT_FOR
  # restart: on-failure handles the case where Trino port is open but still initializing
  ontop:
    image: ontop/ontop:5.5.0
    container_name: ontop
    networks:
      iceberg_net:
    ports:
      - "8089:8080"
    depends_on:
      - trino
    restart: on-failure
    volumes:
      - ./ontop:/opt/ontop/input
      - ./ontop/trino-jdbc.jar:/opt/ontop/jdbc/trino-jdbc.jar
    environment:
      - ONTOP_ONTOLOGY_FILE=/opt/ontop/input/tpch.owl
      - ONTOP_MAPPING_FILE=/opt/ontop/input/tpch.obda
      - ONTOP_PROPERTIES_FILE=/opt/ontop/input/ontop.properties
      - ONTOP_PORTAL_FILE=/opt/ontop/input/tpch.toml
      - ONTOP_DEV_MODE=true
      - ONTOP_WAIT_FOR=trino:8080
      - ONTOP_WAIT_TIMEOUT=120

networks:
  iceberg_net:
