spring.main.web-application-type=none

# NOTE: You must disable the banner and the console logging
# to allow the STDIO transport to work !!!
spring.main.banner-mode=off
logging.pattern.console=

spring.ai.mcp.server.name=semantic-layer-mcp
spring.ai.mcp.server.version=0.0.1

logging.file.name=~/semantic-layer-mcp.log

# dbt metricflow API configuration
metricflow.url=http://localhost:8087

# Ontop SPARQL endpoint (Knowledge Graph / Ontology)
ontop.sparql.endpoint=http://localhost:8089/sparql
# Path to OWL ontology file — parsed at startup to serve ontology schema queries.
# Override at runtime via: java -Dontop.owl.file=/absolute/path/to/tpch.owl -jar ...
# Or set the ONTOP_OWL_FILE environment variable.
# If not set, kg_ontology_classes tool will return an error but all other KG tools still work.
ontop.owl.file=${ONTOP_OWL_FILE:}
