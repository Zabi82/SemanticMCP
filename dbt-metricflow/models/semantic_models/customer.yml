semantic_models:
  - name: customer
    description: "Customer master data"
    model: ref('stg_customer')
    
    entities:
      - name: customer_id
        type: primary
        expr: custkey
      - name: nation_id
        type: foreign
        expr: nationkey
    
    dimensions:
      - name: market_segment
        type: categorical
        expr: market_segment
        description: "Customer market segment"
      
      - name: customer_name
        type: categorical
        expr: customer_name
      
      - name: customer_key
        type: categorical
        expr: custkey
        description: "Customer ID as a filterable dimension for scoping metrics to specific customers"

      - name: customer_since
        type: time
        expr: "DATE '1990-01-01'"  # Placeholder - all customers treated as existing from this date
        type_params:
          time_granularity: day
    
    measures:
      - name: customer_count
        agg: count_distinct
        expr: custkey
        description: "Total number of unique customers"
        # REQUIRED: Set aggregation time dimension
        agg_time_dimension: customer_since
        create_metric: true
      
      - name: acct_balance_sum
        agg: sum
        expr: account_balance
        description: "Sum of customer account balances"
        agg_time_dimension: customer_since
